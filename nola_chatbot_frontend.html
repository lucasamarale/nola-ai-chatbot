<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nola AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', ui-rounded, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef0f5;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(242,100,96,0.07) 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(28,35,64,0.05) 0%, transparent 45%);
    }

    .chat-wrapper {
      width: 430px;
      height: 690px;
      background: #fff;
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06),
        0 32px 72px rgba(0,0,0,0.11);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: wrapperIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes wrapperIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .chat-header {
      background: #fff;
      padding: 13px 18px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f0f1f5;
      position: relative;
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2.5px;
      background: linear-gradient(90deg, #F26460 0%, #f8a09e 100%);
    }

    /*
     * Logo: carrega o SVG real do site (img cross-origin funciona sem CORS).
     * O wordmark "nola" vem da imagem; adicionamos "AI" ao lado em Comfortaa
     * para compor "nola AI" com a tipografia autêntica.
     */
    .logo-combo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 0px;
      animation: logoPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
    }

    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.65); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Imagem do logo real */
    .nola-wordmark {
      height: 30px;
      width: auto;
      display: block;
      /* max-width impede que o SVG ocupe mais espaço do que esperado */
      max-width: 130px;
    }

    /* "AI" imediatamente após o "nola" da imagem */
    .ai-label {
      font-family: 'Comfortaa', ui-rounded, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #1C2340;
      letter-spacing: -0.2px;
      line-height: 1;
      /* alinha verticalmente com o texto "nola" dentro da imagem */
      margin-bottom: 1px;
      margin-left: 1px;
    }

    /* Spacer empurra badge para a direita */
    .header-spacer { flex: 1; }

    /* ── Status badge ── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11.5px;
      font-weight: 700;
      color: #16a34a;
      white-space: nowrap;
      animation: badgeIn 0.5s 0.3s ease both;
    }

    @keyframes badgeIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
      animation: greenPulse 2s ease-in-out infinite;
    }

    @keyframes greenPulse {
      0%   { box-shadow: 0 0 0 0   rgba(34,197,94,0.7); }
      60%  { box-shadow: 0 0 0 6px rgba(34,197,94,0);   }
      100% { box-shadow: 0 0 0 0   rgba(34,197,94,0);   }
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: #f9fafb;
    }

    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #dde1eb; border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: msgIn 0.32s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .msg-avatar.bot  { background: #fff4f3; padding: 5px; }
    .msg-avatar.user { background: #F26460; padding: 6px; }

    .bubble {
      max-width: 76%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.6;
    }

    .bubble.bot {
      background: #fff;
      color: #1C2340;
      border-bottom-left-radius: 4px;
      border: 1px solid #eceef3;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .bubble.user {
      background: #F26460;
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(242,100,96,0.28);
    }

    /* ── Typing ── */
    .typing-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: msgIn 0.3s ease both;
    }

    .typing-bubble {
      background: #fff;
      border: 1px solid #eceef3;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #F26460;
      border-radius: 50%;
      animation: typingBounce 1.3s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(1) { animation-delay: 0s;    opacity: 0.5; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; opacity: 0.7; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; opacity: 1.0; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-7px); }
    }

    /* ── Info bar ── */
    .info-bar {
      padding: 7px 16px;
      background: #fff8f8;
      border-top: 1px solid #ffe4e3;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #c0524f;
    }

    /* ── Input ── */
    .chat-input-area {
      padding: 12px 16px 14px;
      background: #fff;
      border-top: 1px solid #f0f1f5;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #f6f7fb;
      border: 1.5px solid #e8eaf0;
      border-radius: 14px;
      padding: 0 8px 0 14px;
      height: 48px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-row:focus-within {
      border-color: #F26460;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(242,100,96,0.10);
    }

    .input-row textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13.5px;
      font-family: 'Nunito', ui-rounded, -apple-system, sans-serif;
      font-weight: 500;
      color: #1C2340;
      resize: none;
      outline: none;
      height: 24px;
      max-height: 96px;
      line-height: 1.5;
      padding: 0;
      align-self: center;
      overflow: hidden;
    }

    .input-row textarea::placeholder { color: #b0b5c8; font-weight: 400; }

    .send-btn {
      width: 34px; height: 34px; min-width: 34px;
      background: #F26460;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 6px rgba(242,100,96,0.38);
      flex-shrink: 0;
    }
    .send-btn:hover  { transform: scale(1.07); box-shadow: 0 4px 14px rgba(242,100,96,0.48); }
    .send-btn:active { transform: scale(0.93); box-shadow: none; }
    .send-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 15px; height: 15px; fill: #fff; }

    .powered-by {
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: #b0b5c8;
      margin-top: 9px;
    }
    .powered-by strong { color: #F26460; font-weight: 800; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- ── Header ── -->
  <div class="chat-header">

    <!--
      Logo real carregada via <img> (sem CORS).
      O SVG do site já contém o ícone + wordmark "nola".
      Adicionamos apenas " AI" ao lado para compor "nola AI".
    -->
    <div class="logo-combo">
      <img class="nola-wordmark"
           src="https://usenola.com.br/2026/assets/images/nola-logo-preto.svg"
           alt="nola">
      <span class="ai-label">AI</span>
    </div>

    <div class="header-spacer"></div>

    <div class="status-badge">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <!-- ── Messages ── -->
  <div class="chat-messages" id="messages">
    <div class="message-row">
      <div class="msg-avatar bot" id="av1"></div>
      <div class="bubble bot">Olá! Sou o <strong>nola AI</strong>, assistente virtual do Nola. 👋</div>
    </div>
    <div class="message-row">
      <div class="msg-avatar bot" id="av2"></div>
      <div class="bubble bot">Estou aqui para ajudar com dúvidas sobre a plataforma. Como posso te ajudar hoje?</div>
    </div>
  </div>

  <!-- ── Info bar ── -->
  <div class="info-bar">
    💡 Para casos mais complexos, o time do Nola entra em contato com você em até 2h úteis.
  </div>

  <!-- ── Input ── -->
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1"
        placeholder="Digite sua dúvida sobre a plataforma..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="powered-by"><strong>nola AI</strong> · Suporte inteligente ao cliente · time do Nola</div>
  </div>

</div>

<script>
  const WEBHOOK_URL = 'http://localhost:3001/';
  const sessionId   = 'nola-' + Math.random().toString(36).slice(2, 10);

  /*
   * Avatar: mesma logo real do header, recortada via overflow:hidden
   * para mostrar apenas a parte do ícone (lado esquerdo do SVG).
   */
  function nolaIconSVG(size) {
    // SVG viewBox 0 0 1000 500
    // Ícone (4 formas coral) ocupa x:101–329, y:136–364 → 228×228 unidades
    // Renderizamos a imagem com altura tal que o ícone ocupe exatamente `size` px
    const svgH    = 500, iconX = 101, iconY = 136, iconSz = 228;
    const renderH = Math.round(size * svgH / iconSz);
    const mLeft   = -Math.round(iconX * renderH / svgH);
    const mTop    = -Math.round(iconY * renderH / svgH);
    return `<div style="width:${size}px;height:${size}px;overflow:hidden;flex-shrink:0;">
      <img src="https://usenola.com.br/2026/assets/images/nola-logo-preto.svg"
           style="height:${renderH}px;width:auto;max-width:none;display:block;margin-left:${mLeft}px;margin-top:${mTop}px;"
           alt="nola">
    </div>`;
  }

  function userIconSVG() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="8" r="4" fill="white"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>`;
  }

  document.getElementById('av1').innerHTML = nolaIconSVG(20);
  document.getElementById('av2').innerHTML = nolaIconSVG(20);

  /* ── Textarea resize ── */
  function autoResize(el) {
    el.style.height = 'auto';
    const h = Math.min(el.scrollHeight, 96);
    el.style.height = h + 'px';
    const row = el.closest('.input-row');
    if (h <= 24) {
      row.style.height = '48px'; row.style.padding = '0 8px 0 14px';
      el.style.alignSelf = 'center';
    } else {
      row.style.height = 'auto'; row.style.padding = '10px 8px 10px 14px';
      el.style.alignSelf = 'flex-start';
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  /* ── Mensagens ── */
  function addMessage(text, type) {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `message-row ${type}`;

    const av = document.createElement('div');
    av.className = `msg-avatar ${type}`;
    av.innerHTML = type === 'bot' ? nolaIconSVG(20) : userIconSVG();

    const bubble = document.createElement('div');
    bubble.className = `bubble ${type}`;
    bubble.innerHTML = text
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    row.appendChild(av);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'typing-row'; row.id = 'typing';
    const av = document.createElement('div');
    av.className = 'msg-avatar bot';
    av.innerHTML = nolaIconSVG(20);
    const bbl = document.createElement('div');
    bbl.className = 'typing-bubble';
    bbl.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(av); row.appendChild(bbl);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  /* ── Envio ── */
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text  = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = ''; input.style.height = '24px';
    const row = input.closest('.input-row');
    row.style.height = '48px'; row.style.padding = '0 8px 0 14px';
    input.style.alignSelf = 'center';

    addMessage(text, 'user');
    showTyping();

    try {
      const res  = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text, sessionId })
      });
      const data = await res.json();
      removeTyping();
      const reply =
        data.output || data.text || data.response || data.message ||
        (Array.isArray(data) && (data[0]?.output || data[0]?.text)) ||
        'Desculpe, não consegui processar sua mensagem. Tente novamente.';
      addMessage(reply, 'bot');
    } catch {
      removeTyping();
      addMessage('Ops! Houve um problema de conexão. Tente novamente em instantes.', 'bot');
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
